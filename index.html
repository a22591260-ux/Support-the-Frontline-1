<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閃動格子支援前線</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .config-container {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            width: 480px;
            box-sizing: border-box;
        }

        .setup-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 10px;
        }

        .setup-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .config-container input[type="number"] {
            width: 55px;
            padding: 5px;
            font-size: 15px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .import-area {
            display: none; 
            margin-top: 10px;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }

        .tab-headers {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 6px 12px;
            font-size: 13px;
            background-color: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: #2980b9;
            color: white;
            font-weight: bold;
        }

        .tab-content-panel {
            display: none;
        }
        .tab-content-panel.active {
            display: block;
        }

        /* 📊 修正後的編輯器容器：由它來控管滾動條與固定高度 */
        .editor-container {
            display: flex;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #ffffff;
            height: 260px;       /* 固定的顯示高度 */
            overflow-y: auto;    /* 統一由最外層引導垂直滾動條 */
            overflow-x: hidden;
            position: relative;
        }

        /* 左側行號欄：改為跟隨父層高度，取消獨立滾動 */
        .line-numbers {
            width: 35px;
            background-color: #f1f2f6;
            border-right: 1px solid #ddd;
            color: #a4b0be;
            text-align: center;
            padding: 6px 0;      /* 精準對齊 Textarea 的 padding */
            font-size: 14px;
            line-height: 24px;   /* 強制行高 24px */
            user-select: none;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
        }

        /* 右側文字輸入框：取消滾動條，高度自動撐滿容器 */
        .import-area textarea {
            flex: 1;
            height: 100%;        /* 填滿父容器 */
            min-height: 400px;   /* 預設拉高，確保沒有底部的截斷 */
            border: none;
            outline: none;
            font-size: 14px;
            padding: 6px 8px;    /* 精準對齊行號欄的 padding */
            box-sizing: border-box;
            line-height: 24px;   /* 強制行高 24px，與行號完美嚙合 */
            resize: none;
            overflow-y: hidden;  /* 關閉獨立滾動條，防錯位核心 */
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        .import-tip {
            font-size: 12px;
            color: #e67e22;
            margin-bottom: 8px;
            font-weight: bold;
            line-height: 1.4;
        }

        .info {
            font-size: 18px;
            margin-bottom: 10px;
            color: #666;
            text-align: center;
        }

        .round-indicator {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .hint-text {
            font-size: 15px;
            color: #e67e22;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .control-btns {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 110px);
            grid-template-rows: repeat(4, 110px);
            gap: 15px;
            perspective: 1000px;
            margin: 10px 0;
        }

        .card {
            width: 110px;
            height: 110px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: default;
        }

        .card.playable {
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
            cursor: default;
        }

        .card.auto-flipped .card-front {
            border: 4px solid #e67e22 !important;
            box-shadow: 0 0 15px rgba(230, 126, 34, 0.8);
            background-color: #fffdfa !important;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        .card-back {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%) !important;
            color: white !important;
            font-size: 38px;
            font-weight: bold;
        }

        .card-front {
            background-color: #ffffff !important;
            color: #2c3e50 !important;
            transform: rotateY(180deg);
            border: 3px solid #3498db;
            padding: 6px;
            text-align: center;
            box-sizing: border-box;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .card-front .item-name {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.1;
            word-break: break-all;
            max-width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .bomb-img {
            width: 65px;
            height: 65px;
            object-fit: contain;
        }

        .card-front .qty-tag {
            display: block;
            margin-top: 3px;
            color: #e67e22;
            font-size: 22px;
            font-weight: bold;
            line-height: 1;
        }

        .btn {
            padding: 6px 15px;
            font-size: 14px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #1a252f;
        }

        .btn-main {
            font-size: 20px;
            padding: 12px 40px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        
        .btn-start {
            background-color: #27ae60;
        }
        .btn-start:hover {
            background-color: #219653;
        }
        
        .btn-next {
            background-color: #e67e22;
            animation: pulse 1.5s infinite;
        }
        .btn-next:hover {
            background-color: #d35400;
        }

        @keyframes pulse {
            0% { box-shadow: 0 4px 6px rgba(230, 126, 34, 0.4); }
            50% { box-shadow: 0 4px 15px rgba(230, 126, 34, 0.8); }
            100% { box-shadow: 0 4px 6px rgba(230, 126, 34, 0.4); }
        }

        .btn-main:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>閃動格子支援前線</h1>
    
    <div class="config-container">
        <div class="setup-row">
            <div class="setup-item">
                <label for="totalRoundsInput">總任務回合：</label>
                <input type="number" id="totalRoundsInput" value="3" min="1" max="10" onchange="generateTabs()">
            </div>
            <div class="setup-item">
                <label for="secondsInput">閃動翻牌間隔：</label>
                <input type="number" id="secondsInput" value="5" min="1" max="60"> 秒
            </div>
            <button class="btn" onclick="toggleImportArea()">修改/匯入任務</button>
        </div>

        <div class="import-area" id="importArea">
            <div class="import-tip">
                💡 格式：品項 * 數量 (若為炸彈直接輸入「炸彈」即可，免填數量)<br>
                💡 修正版：左側編號與右側文字已同步鎖定，絕對精準對齊不走位！
            </div>
            
            <div class="tab-headers" id="tabHeaders"></div>
            <div id="tabContents"></div>
        </div>
        
        <div style="text-align: right; margin-top: 10px;">
            <button class="btn" style="background-color: #2980b9;" onclick="applySettingsAndReset()">套用設定並部署格子</button>
        </div>
    </div>

    <div class="round-indicator">目前進度：第 <span id="currentRound">0</span> / <span id="totalRounds">0</span> 回合</div>
    <div class="info">
        本局已解鎖：<span id="flippedCount">0</span> / 16 個格子
    </div>
    <div class="hint-text" id="statusHint">已預掛第一回合題目！直接點選下方【開始遊戲】即可啟動！</div>

    <div class="control-btns">
        <button id="mainGameBtn" class="btn btn-main btn-start" onclick="handleMainBtnClick()">▶ 開始遊戲</button>
    </div>

    <div class="game-board" id="board"></div>

    <script>
        let allRoundsData = []; 
        let flippedCount = 0; 
        let currentRound = 1; 
        let maxRounds = 3;    
        let flipIntervalSeconds = 5; 
        let autoFlipTimer = null;
        let gameState = 'ready'; 

        const bombIconUrl = "https://img.icons8.com/emoji/96/bomb-emoji.png";

        const presetRound1Text = `眼鏡 * 2
眼鏡 * 2
水壺 * 4
鞋子 * 3
鑰匙 * 1
手錶 * 5
背包 * 2
雨傘 * 3
帽子 * 4
手機 * 1
耳機 * 5
鉛筆 * 2
書本 * 3
杯子 * 4
肥皂 * 1
肥皂 * 1`;

        const board = document.getElementById('board');
        const flippedCountDisplay = document.getElementById('flippedCount');
        const currentRoundDisplay = document.getElementById('currentRound');
        const totalRoundsDisplay = document.getElementById('totalRounds');
        const totalRoundsInput = document.getElementById('totalRoundsInput');
        const secondsInput = document.getElementById('secondsInput');
        const statusHint = document.getElementById('statusHint');
        const importArea = document.getElementById('importArea');
        const mainGameBtn = document.getElementById('mainGameBtn');
        const tabHeaders = document.getElementById('tabHeaders');
        const tabContents = document.getElementById('tabContents');

        function toggleImportArea() {
            importArea.style.display = (importArea.style.display === 'block') ? 'none' : 'block';
        }

        // 建立 1~16 行號 HTML
        function createLineNumbersText() {
            let arr = [];
            for(let i = 1; i <= 16; i++) {
                arr.push(i);
            }
            return arr.join('<br>');
        }

        function generateTabs() {
            let rounds = parseInt(totalRoundsInput.value);
            if (isNaN(rounds) || rounds < 1) rounds = 1;
            if (rounds > 10) rounds = 10; 
            totalRoundsInput.value = rounds;

            let savedTexts = {};
            for(let i = 1; i <= 10; i++) {
                let existingTextarea = document.getElementById(`textarea-round-${i}`);
                if(existingTextarea) {
                    savedTexts[i] = existingTextarea.value;
                } else if (i === 1) {
                    savedTexts[1] = presetRound1Text;
                }
            }

            tabHeaders.innerHTML = '';
            tabContents.innerHTML = '';

            for (let i = 1; i <= rounds; i++) {
                let btn = document.createElement('button');
                btn.type = "button";
                btn.className = `tab-btn ${i === 1 ? 'active' : ''}`;
                btn.id = `tab-btn-${i}`;
                btn.innerText = `第 ${i} 回合`;
                btn.onclick = function() { switchTab(i); };
                tabHeaders.appendChild(btn);

                let panel = document.createElement('div');
                panel.className = `tab-content-panel ${i === 1 ? 'active' : ''}`;
                panel.id = `tab-panel-${i}`;
                
                let editorContainer = document.createElement('div');
                editorContainer.className = 'editor-container';

                // 左邊行號區
                let numDiv = document.createElement('div');
                numDiv.className = 'line-numbers';
                numDiv.id = `lines-round-${i}`;
                numDiv.innerHTML = createLineNumbersText();

                // 右邊輸入框
                let textarea = document.createElement('textarea');
                textarea.id = `textarea-round-${i}`;
                textarea.placeholder = `請在此貼上「第 ${i} 回合」的 16 行 Excel 物資清單...`;
                textarea.wrap = 'off'; 
                
                if (savedTexts[i]) {
                    textarea.value = savedTexts[i];
                }

                // 當輸入內容改變時，動態同步計算高度，確保拉長時行號仍貼齊
                textarea.oninput = function() {
                    let lineCount = this.value.split('\n').length;
                    let maxLines = Math.max(lineCount, 16);
                    let numArr = [];
                    for(let k=1; k<=maxLines; k++) numArr.push(k);
                    numDiv.innerHTML = numArr.join('<br>');
                };
                
                editorContainer.appendChild(numDiv);
                editorContainer.appendChild(textarea);
                panel.appendChild(editorContainer);
                tabContents.appendChild(panel);
                
                // 觸發一次 input 確保初始文字長度也有正確的行號數量
                textarea.oninput();
            }
        }

        function switchTab(targetIndex) {
            let rounds = parseInt(totalRoundsInput.value);
            for(let i = 1; i <= rounds; i++) {
                let btn = document.getElementById(`tab-btn-${i}`);
                let panel = document.getElementById(`tab-panel-${i}`);
                if(btn && panel) {
                    if(i === targetIndex) {
                        btn.classList.add('active');
                        panel.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                        panel.classList.remove('active');
                    }
                }
            }
        }

        function parseSingleTabText(textValue) {
            let lines = textValue.split('\n')
                                .map(line => line.trim())
                                .filter(line => line.length > 0);
            
            let roundItems = [];
            lines.forEach(line => {
                let match = line.match(/^([^\*,x,X,\s，、]+)(?:\s*[\*,x,X,，,、,\s,數量]+\s*(\d+))?/);
                if (match) {
                    let name = match[1].trim();
                    if(name === "品項" || name === "品項*數量") return;
                    let qty = match[2] ? parseInt(match[2]) : 1;
                    roundItems.push({ name: name, qty: qty });
                }
            });

            while (roundItems.length < 16) {
                roundItems.push({ name: "（待前方支援）", qty: 1 });
            }
            return roundItems.slice(0, 16);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function applySettingsAndReset() {
            let roundVal = parseInt(totalRoundsInput.value);
            if (isNaN(roundVal) || roundVal < 1) return alert("請輸入有效的任務回合數");
            maxRounds = roundVal;
            
            let secVal = parseInt(secondsInput.value);
            if (isNaN(secVal) || secVal < 1) return alert("請輸入有效的閃動間隔秒數");
            flipIntervalSeconds = secVal;

            allRoundsData = [];
            let hasEmptyTab = false;

            for (let i = 1; i <= maxRounds; i++) {
                let txtArea = document.getElementById(`textarea-round-${i}`);
                let txtValue = txtArea ? txtArea.value.trim() : "";
                
                if (txtValue === "") {
                    hasEmptyTab = true;
                }
                
                let roundParsedData = parseSingleTabText(txtValue);
                allRoundsData.push(roundParsedData);
            }

            if (hasEmptyTab) {
                if(!confirm("注意到有部分回合尚未貼上支援題目。確定要繼續部署嗎？")) {
                    return;
                }
            }

            currentRound = 1;
            importArea.style.display = 'none'; 
            
            initRoundBoard();
        }

        function initRoundBoard() {
            if (autoFlipTimer) {
                clearInterval(autoFlipTimer);
                autoFlipTimer = null;
            }
            
            gameState = 'ready';
            mainGameBtn.disabled = false;
            mainGameBtn.className = "btn btn-main btn-start";
            mainGameBtn.innerText = "▶ 開始遊戲";
            statusHint.innerText = `第 ${currentRound} 回合前線格子準備就緒！請點擊【開始遊戲】。`;
            
            board.innerHTML = '';
            flippedCount = 0;
            flippedCountDisplay.innerText = flippedCount;
            currentRoundDisplay.innerText = currentRound;
            totalRoundsDisplay.innerText = maxRounds;

            let currentRoundData = allRoundsData[currentRound - 1] || [];
            const shuffledItems = shuffle([...currentRoundData]);

            shuffledItems.forEach((item) => {
                const card = document.createElement('div');
                card.classList.add('card');

                let contentHtml = "";
                if (item.name === "炸彈") {
                    contentHtml = `
                        <div class="card-face card-front">
                            <img src="${bombIconUrl}" class="bomb-img" alt="炸彈">
                        </div>`;
                } else {
                    contentHtml = `
                        <div class="card-face card-front">
                            <span class="item-name">${item.name}</span>
                            <span class="qty-tag">* ${item.qty}</span>
                        </div>`;
                }

                card.innerHTML = `
                    <div class="card-face card-back">?</div>
                    ${contentHtml}
                `;

                card.addEventListener('click', function() {
                    if (gameState !== 'playing') return; 
                    if (!this.classList.contains('flipped')) {
                        exposeCard(this, false);
                    }
                });
                
                board.appendChild(card);
            });
        }

        function handleMainBtnClick() {
            if (allRoundsData.length === 0) {
                applySettingsAndReset();
            }

            if (gameState === 'ready') {
                gameState = 'playing';
                mainGameBtn.disabled = true; 
                mainGameBtn.innerText = "🚀 前線物資搜集中";
                statusHint.innerText = `⏱️ 格子無規律閃動中！每 ${flipIntervalSeconds} 秒隨機自動解鎖一個項目...`;

                const cards = document.querySelectorAll('.card');
                cards.forEach(card => card.classList.add('playable'));

                startAutoFlipTimer();
            } 
            else if (gameState === 'round_end') {
                currentRound++;
                initRoundBoard();
            } 
            else if (gameState === 'all_finished') {
                currentRound = 1;
                initRoundBoard();
            }
        }

        function exposeCard(cardElement, isAuto = false) {
            cardElement.classList.add('flipped');
            if (isAuto) {
                cardElement.classList.add('auto-flipped');
            }
            flippedCount++;
            flippedCountDisplay.innerText = flippedCount;

            if (flippedCount === 16) {
                if (autoFlipTimer) {
                    clearInterval(autoFlipTimer);
                    autoFlipTimer = null;
                }
                
                if (currentRound < maxRounds) {
                    gameState = 'round_end';
                    mainGameBtn.disabled = false; 
                    mainGameBtn.className = "btn btn-main btn-next";
                    mainGameBtn.innerText = "⏭️ 前進下一回合任務";
                    statusHint.innerText = `第 ${currentRound} 回合支援物資已全數開牌！畫面已固定，對帳計分完畢後請點擊【前進下一回合任務】`;
                } else {
                    gameState = 'all_finished';
                    mainGameBtn.disabled = false;
                    mainGameBtn.className = "btn btn-main btn-start";
                    mainGameBtn.innerText = "🔄 重啟前線戰局";
                    statusHint.innerText = `🎉 報告長官！本次部署的 ${maxRounds} 個支援前線任務已全部完成！點擊按鈕可重新啟動。`;
                }
            }
        }

        function startAutoFlipTimer() {
            if (autoFlipTimer) clearInterval(autoFlipTimer);
            
            autoFlipTimer = setInterval(() => {
                const unFlippedCards = Array.from(document.querySelectorAll('.card:not(.flipped)'));
                
                if (unFlippedCards.length === 0) return;

                const randomIndex = Math.floor(Math.random() * unFlippedCards.length);
                const randomCard = unFlippedCards[randomIndex];

                exposeCard(randomCard, true);

            }, flipIntervalSeconds * 1000); 
        }

        generateTabs();
        applySettingsAndReset();
    </script>
</body>
</html>
