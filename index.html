<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閃動格子支援前線 - 自動存檔與回復版</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --primary-neon: #00f2fe;
            --accent-neon: #9b51e0;
            --success-neon: #00ff87;
            --warning-neon: #ff9f43;
            --danger-neon: #ff4757;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at 50% 30%, #1e1b4b 0%, var(--bg-color) 70%);
            position: relative;
        }

        /* 🚨 全螢幕警示外框 */
        .panic-border {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: 0px solid transparent;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 9999;
            transition: border 0.3s;
        }

        body.panic-mode .panic-border {
            border: 10px solid var(--danger-neon);
            box-shadow: inset 0 0 30px rgba(255, 71, 87, 0.6);
            animation: borderShake 0.15s infinite linear, borderFlash 0.5s infinite alternate;
        }

        @keyframes borderShake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-4px, 3px); }
            40% { transform: translate(4px, -2px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(3px, 4px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes borderFlash {
            from { border-color: var(--danger-neon); box-shadow: inset 0 0 20px rgba(255, 71, 87, 0.5); }
            to { border-color: #7a0010; box-shadow: inset 0 0 40px rgba(255, 71, 87, 0.9); }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--primary-neon);
            animation: titleGlow 2s infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px var(--primary-neon), 0 0 20px var(--primary-neon); }
            to { text-shadow: 0 0 15px var(--primary-neon), 0 0 30px var(--accent-neon); }
        }

        /* 頂部設定區 */
        .config-container {
            background: var(--panel-bg);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            width: 785px;
            box-sizing: border-box;
        }

        .setup-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .setup-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #cbd5e1;
        }

        .config-container input[type="number"] {
            width: 60px;
            padding: 6px;
            font-size: 15px;
            text-align: center;
            background-color: #0f172a;
            border: 1px solid var(--primary-neon);
            border-radius: 6px;
            color: #fff;
            font-weight: bold;
        }

        /* 物資配置面板 */
        .import-area {
            display: none; 
            margin-top: 15px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 15px;
        }

        .tab-headers {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            border-bottom: 2px solid #334155;
            padding-bottom: 5px;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 8px 16px;
            font-size: 13px;
            background-color: #334155;
            color: #94a3b8;
            border: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-weight: bold;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary-neon) 0%, var(--accent-neon) 100%);
            color: white;
            box-shadow: 0 -2px 10px rgba(0, 242, 254, 0.3);
        }

        .tab-content-panel {
            display: none;
        }
        .tab-content-panel.active {
            display: block;
        }

        .editor-flex-layout {
            display: flex;
            gap: 15px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
        }

        .paste-box-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .paste-box-zone textarea {
            width: 100%;
            height: 200px;
            background-color: #1e293b;
            color: #fff;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 8px;
            font-size: 13px;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        .dropdown-grid-container {
            flex: 1.2;
            height: 245px;
            overflow-y: auto;
            padding-right: 5px;
            box-sizing: border-box;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid #1e293b;
        }
        .item-row:last-child { border-bottom: none; }

        .item-num {
            width: 24px;
            color: #64748b;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }

        .select-item, .select-qty {
            background-color: #1e293b;
            color: #fff;
            border: 1px solid #475569;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 13px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }
        .select-item { flex: 2; }
        .select-qty { flex: 1; }

        .main-layout {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 25px;
            width: 785px;
            box-sizing: border-box;
        }

        .left-control-panel {
            width: 275px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            height: 485px;
            box-sizing: border-box;
        }

        .round-indicator {
            font-size: 18px;
            font-weight: 800;
            color: #94a3b8;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .round-indicator span {
            color: var(--primary-neon);
            font-size: 24px;
        }

        .timer-box { width: 100%; margin-bottom: 20px; }
        .timer-container {
            font-size: 26px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            color: var(--success-neon);
            text-shadow: 0 0 10px rgba(0, 255, 135, 0.3);
            margin-bottom: 8px;
            text-align: center;
        }
        
        .progress-bar-bg {
            width: 100%; height: 8px; background-color: #0f172a; border-radius: 4px; overflow: hidden; border: 1px solid #334155;
        }
        .progress-bar-fill {
            width: 100%; height: 100%; background: linear-gradient(90deg, var(--success-neon), #2ecc71); transition: width 1s linear;
        }

        .timer-container.danger { color: var(--danger-neon); text-shadow: 0 0 15px var(--danger-neon); }
        .timer-container.danger + .progress-bar-bg .progress-bar-fill { background: linear-gradient(90deg, var(--danger-neon), #ff4757); }

        .info { font-size: 15px; color: #cbd5e1; margin-bottom: 10px; font-weight: bold; }
        .info span { color: var(--primary-neon); font-size: 18px; }

        .hint-text {
            font-size: 13px; color: #94a3b8; margin-bottom: 20px; font-weight: 500; line-height: 1.5;
            background: #0f172a; padding: 10px; border-radius: 8px; border-left: 4px solid var(--warning-neon); width: 100%; box-sizing: border-box;
        }

        .control-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: auto; }

        .right-board-panel { width: 485px; height: 485px; flex-shrink: 0; box-sizing: border-box; }
        .game-board {
            display: grid; grid-template-columns: repeat(4, 110px); grid-template-rows: repeat(4, 110px); gap: 15px;
            width: 100%; height: 100%; perspective: 1200px; box-sizing: border-box;
        }

        .card { width: 110px; height: 110px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); box-sizing: border-box; }
        .card.playable { cursor: pointer; }
        .card.playable:hover .card-back { border-color: var(--primary-neon); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); transform: scale(1.03); }
        .card.flipped { transform: rotateY(180deg); }

        .card.auto-flipped .card-front { border: 4px solid var(--warning-neon) !important; box-shadow: 0 0 25px var(--warning-neon); animation: autoFlipGlow 2s infinite alternate; }
        .card.bomb-exploded .card-front { border: 4px solid var(--danger-neon) !important; box-shadow: 0 0 30px var(--danger-neon); background: #2d1316 !important; }

        @keyframes autoFlipGlow { 0% { box-shadow: 0 0 15px var(--warning-neon); } 100% { box-shadow: 0 0 30px #ff007f; } }

        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 14px; box-sizing: border-box; }
        .card-back { background: linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%) !important; color: var(--primary-neon) !important; font-size: 36px; font-weight: 900; border: 2px solid #4c1d95; text-shadow: 0 0 8px var(--primary-neon); }
        .card-front { background-color: #ffffff !important; color: #0f172a !important; transform: rotateY(180deg); border: 3px solid var(--primary-neon); padding: 6px; text-align: center; overflow: hidden; }

        .card-front .item-name { font-size: 19px; font-weight: 900; line-height: 1.1; word-break: break-all; max-width: 100%; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .bomb-img { width: 70px; height: 70px; object-fit: contain; animation: bombShake 0.5s infinite alternate; }
        @keyframes bombShake { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }
        .card-front .qty-tag { display: block; margin-top: 4px; color: #e67e22; font-size: 22px; font-weight: 900; line-height: 1; }

        .btn { padding: 8px 18px; font-size: 14px; background-color: #334155; color: white; border: 1px solid #475569; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #475569; border-color: #94a3b8; }
        
        /* 💾 自動存檔提示與重設按鈕樣式 */
        .auto-save-badge { font-size: 12px; color: var(--success-neon); display: flex; align-items: center; gap: 4px; font-weight: bold; }
        .btn-reset { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; border: none; box-shadow: 0 0 10px rgba(231, 76, 60, 0.4); }
        .btn-reset:hover { box-shadow: 0 0 20px rgba(231, 76, 60, 0.7); transform: translateY(-1px); }

        .btn-main { font-size: 18px; padding: 14px 20px; font-weight: 800; border-radius: 10px; width: 100%; box-sizing: border-box; border: none; text-transform: uppercase; }
        
        .btn-start { background: linear-gradient(135deg, #00ff87 0%, #60efff 100%); color: #0f172a; box-shadow: 0 4px 15px rgba(0, 255, 135, 0.4); }
        .btn-start:hover { box-shadow: 0 4px 25px rgba(0, 255, 135, 0.7); transform: translateY(-2px); }
        .btn-pause { background: linear-gradient(135deg, #7f8c8d 0%, #95a5a6 100%); color: white; }
        .btn-end-round { background: linear-gradient(135deg, #3a7bd5 0%, #3a6073 100%); color: white; border: 1px solid #4facfe; }
        .btn-next { background: linear-gradient(135deg, #ff9f43 0%, #ff4757 100%); color: white; animation: pulseGlow 1.2s infinite; }

        @keyframes pulseGlow { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .btn-main:disabled { background: #334155 !important; color: #64748b !important; cursor: not-allowed; box-shadow: none !important; transform: none !important; }
    </style>
</head>
<body>

    <div class="panic-border"></div>

    <h1>⚡ 支援前線：閃動戰場 ⚡</h1>
    
    <div class="config-container">
        <div class="setup-row">
            <div class="setup-item">
                <span>🎯 總任務：</span>
                <input type="number" id="totalRoundsInput" value="7" min="1" max="10" onchange="handleTotalRoundsChange()"> 回合
            </div>
            <div class="setup-item">
                <span>⏱️ 閃動速度：</span>
                <!-- 🛠️ 預設值調整為 5 秒 -->
                <input type="number" id="secondsInput" value="5" min="1" max="60" onchange="autoSaveSettings()"> 秒/次
            </div>
            <div class="setup-item">
                <span>⏳ 當前回合預設時限：</span>
                <input type="number" id="timerLimitInput" value="120" min="5" max="600" onchange="autoSaveSettings()"> 秒
            </div>
            <button class="btn" onclick="toggleImportArea()">🛠️ 配置戰略物資</button>
        </div>

        <div class="import-area" id="importArea">
            <div class="tab-headers" id="tabHeaders"></div>
            <div id="tabContents"></div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;">
            <div class="auto-save-badge">
                <span>🟢 系統已啟用即時自動存檔</span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-reset" onclick="resetToDefaultSettings()">⚠️ 回復初始設定</button>
                <button class="btn" style="background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color:#0f172a; border:none;" onclick="applySettingsAndReset()">⚡ 重新部署新戰場</button>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="left-control-panel">
            <div class="round-indicator">STAGE <span id="currentRound">0</span> / <span id="totalRounds">0</span></div>
            <div class="timer-box">
                <div class="timer-container" id="timerDisplay">02:00</div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
            </div>
            <div class="info">戰局解鎖度：<span id="flippedCount">0</span> / 16</div>
            <div class="hint-text" id="statusHint">點擊【START】啟動閃動戰場！</div>
            <div class="control-btns">
                <button id="mainGameBtn" class="btn btn-main btn-start" onclick="handleMainBtnClick()">▶ START GAME</button>
                <button id="pauseGameBtn" class="btn btn-main btn-pause" style="display: none;" onclick="handlePauseBtnClick()">⏸️ PAUSE</button>
                <button id="endRoundBtn" class="btn btn-main btn-end-round" style="display: none;" onclick="handleEndRoundBtnClick()">⏭️ 結束該回合</button>
            </div>
        </div>

        <div class="right-board-panel">
            <div class="game-board" id="board"></div>
        </div>
    </div>

    <script>
        // 🛠️ 閃動初始變數調整為 5 秒
        let flippedCount = 0, currentRound = 1, maxRounds = 7, flipIntervalSeconds = 5;
        let autoFlipTimer = null, countdownTimer = null, timeLeft = 120, initialTimeLimit = 120, gameState = 'ready';
        const bombIconUrl = "https://img.icons8.com/emoji/96/bomb-emoji.png";

        const availableItems = ["眼鏡", "水壺", "左鞋", "手錶", "粉筆", "毛巾盤", "領巾", "右鞋", "襪子", "名牌", "左腳", "右腳", "左手", "右手", "輔導員", "學員", "毛巾", "深蹲", "開合跳", "蛙跳", "伏地挺身", "炸彈", "（空）"];

        // 系統最原始預設配置（唯讀備份）
        const originalPresetTexts = {
            1: `眼鏡 * 1\n水壺 * 1\n左鞋 * 2\n手錶 * 4\n粉筆 * 3\n毛巾盤 * 2\n領巾 * 2\n右鞋 * 4\n襪子 * 3\n名牌 * 2\n水壺 * 4\n眼鏡 * 2\n左鞋 * 5\n毛巾 * 2\n名牌 * 3\n水壺 * 3`,
            2: `眼鏡 * 2\n水壺 * 2\n左鞋 * 3\n手錶 * 1\n粉筆 * 1\n毛巾盤 * 3\n領巾 * 1\n右鞋 * 3\n襪子 * 4\n名牌 * 3\n左腳 * 1\n右手 * 2\n輔導員 * 1\n學員 * 2\n右腳 * 1\n左手 * 1`,
            3: `眼鏡 * 2\n水壺 * 3\n左鞋 * 3\n手錶 * 2\n粉筆 * 2\n毛巾盤 * 2\n領巾 * 3\n炸彈\n炸彈\n名牌 * 4\n炸彈\n左手 * 3\n炸彈\n學員 * 1\n右腳 * 2\n炸彈`,
            4: `眼鏡 * 1\n水壺 * 4\n炸彈\n手錶 * 3\n粉筆 * 3\n毛巾 * 1\n炸彈\n右鞋 * 6\n襪子 * 2\n名牌 * 5\n左腳 * 2\n炸彈\n輔導員 * 1\n炸彈\n炸彈\n右手 * 1`,
            5: `眼鏡 * 4\n水壺 * 7\n左鞋 * 7\n手錶 * 4\n粉筆 * 4\n毛巾盤 * 1\n深蹲 * 10\n炸彈\n炸彈\n名牌 * 10\n炸彈\n右手 * 4\n炸彈\n開合跳 * 20\n右腳 * 4\n炸彈`,
            6: `炸彈\n炸彈\n左鞋 * 8\n炸彈\n粉筆 * 2\n毛巾 * 3\n炸彈\n右鞋 * 5\n襪子 * 7\n名牌 * 9\n左腳 * 3\n右手 * 4\n蛙跳 * 20\n學員 * 3\n開合跳 * 20\n深蹲 * 10`,
            7: `眼鏡 * 3\n水壺 * 6\n左鞋 * 6\n手錶 * 3\n粉筆 * 2\n毛巾盤 * 2\n領巾 * 3\n右鞋 * 3\n襪子 * 5\n名牌 * 10\n左腳 * 4\n右手 * 7\n蛙跳 * 20\n伏地挺身 * 10\n開合跳 * 20\n深蹲 * 10`
        };

        const board = document.getElementById('board'), flippedCountDisplay = document.getElementById('flippedCount');
        const currentRoundDisplay = document.getElementById('currentRound'), totalRoundsDisplay = document.getElementById('totalRounds');
        const totalRoundsInput = document.getElementById('totalRoundsInput'), secondsInput = document.getElementById('secondsInput');
        const timerLimitInput = document.getElementById('timerLimitInput'), timerDisplay = document.getElementById('timerDisplay');
        const progressBar = document.getElementById('progressBar'), statusHint = document.getElementById('statusHint');
        const importArea = document.getElementById('importArea'), mainGameBtn = document.getElementById('mainGameBtn'), pauseGameBtn = document.getElementById('pauseGameBtn');
        const endRoundBtn = document.getElementById('endRoundBtn'); 
        const tabHeaders = document.getElementById('tabHeaders'), tabContents = document.getElementById('tabContents');

        // ==========================================
        // 💾 自動存檔與回復預設邏輯
        // ==========================================

        // 1. 自動儲存頂部設定
        function autoSaveSettings() {
            localStorage.setItem('autosave_totalRounds', totalRoundsInput.value);
            localStorage.setItem('autosave_seconds', secondsInput.value);
            localStorage.setItem('autosave_timerLimit', timerLimitInput.value);
        }

        // 2. 自動儲存特定回合的文字與下拉配置
        function autoSaveRoundData(roundIndex) {
            let txtValue = document.getElementById(`txt-paste-${roundIndex}`)?.value || '';
            localStorage.setItem(`autosave_txt_round_${roundIndex}`, txtValue);

            let dropdowns = [];
            for(let i = 0; i < 16; i++) {
                let selItem = document.getElementById(`sel-item-${roundIndex}-${i}`);
                let selQty = document.getElementById(`sel-qty-${roundIndex}-${i}`);
                if(selItem && selQty) {
                    dropdowns.push({ name: selItem.value, qty: parseInt(selQty.value) });
                }
            }
            if(dropdowns.length > 0) {
                localStorage.setItem(`autosave_drop_round_${roundIndex}`, JSON.stringify(dropdowns));
            }
        }

        // 3. 變更總回合數時，儲存設定並重新繪製 Tabs
        function handleTotalRoundsChange() {
            autoSaveSettings();
            generateTabs();
        }

        // 4. 回復初始設定（一鍵清空自訂，重新載入最原始版本）
        function resetToDefaultSettings() {
            if (confirm("⚠️ 確定要清除所有修改，並回復至系統預設值嗎？(不可還原)")) {
                // 清空 Local Storage 內的所有自動存檔 key
                for (let i = localStorage.length - 1; i >= 0; i--) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('autosave_')) {
                        localStorage.removeItem(key);
                    }
                }
                
                // 還原輸入框預設值 (此處亦修正為預設 5 秒)
                totalRoundsInput.value = "7";
                secondsInput.value = "5";
                timerLimitInput.value = "120";

                // 自動儲存初始設定
                autoSaveSettings();
                
                // 重新載入與重置
                generateTabs();
                applySettingsAndReset();
                
                alert("✨ 已成功回復至初始原廠設定！");
            }
        }

        // 5. 初始化網頁時載入暫存
        function loadSettingsFromAutoSave() {
            if(localStorage.getItem('autosave_totalRounds')) totalRoundsInput.value = localStorage.getItem('autosave_totalRounds');
            if(localStorage.getItem('autosave_seconds')) secondsInput.value = localStorage.getItem('autosave_seconds');
            if(localStorage.getItem('autosave_timerLimit')) timerLimitInput.value = localStorage.getItem('autosave_timerLimit');
        }

        // ==========================================
        // 顯示介面與選單操作
        // ==========================================

        function toggleImportArea() { importArea.style.display = (importArea.style.display === 'block') ? 'none' : 'block'; }

        function generateTabs() {
            let rounds = parseInt(totalRoundsInput.value) || 7;
            if (rounds < 1) rounds = 1; if (rounds > 10) rounds = 10;
            totalRoundsInput.value = rounds;

            let backupDropdowns = {};
            for(let r = 1; r <= 10; r++) {
                backupDropdowns[r] = [];
                for(let i = 0; i < 16; i++) {
                    let selItem = document.getElementById(`sel-item-${r}-${i}`), selQty = document.getElementById(`sel-qty-${r}-${i}`);
                    if(selItem && selQty) backupDropdowns[r].push({ name: selItem.value, qty: parseInt(selQty.value) });
                }
            }

            tabHeaders.innerHTML = ''; tabContents.innerHTML = '';

            for (let r = 1; r <= rounds; r++) {
                let btn = document.createElement('button');
                btn.type = "button"; btn.className = `tab-btn ${r === 1 ? 'active' : ''}`; btn.id = `tab-btn-${r}`; btn.innerText = `第 ${r} 回合`;
                btn.onclick = function() { switchTab(r); };
                tabHeaders.appendChild(btn);

                let panel = document.createElement('div');
                panel.className = `tab-content-panel ${r === 1 ? 'active' : ''}`; panel.id = `tab-panel-${r}`;
                
                let flexLayout = document.createElement('div');
                flexLayout.className = 'editor-flex-layout';

                let pasteZone = document.createElement('div');
                pasteZone.className = 'paste-box-zone';
                
                let textarea = document.createElement('textarea');
                textarea.id = `txt-paste-${r}`;
                textarea.placeholder = `【文字複製貼上區】\n請直接在此貼上 Excel 或文字清單\n格式如：眼鏡 * 2`;
                
                // 優先讀取自動存檔，若無，則載入預設配置
                let storedTxt = localStorage.getItem(`autosave_txt_round_${r}`);
                if (storedTxt !== null) {
                    textarea.value = storedTxt;
                } else if(originalPresetTexts[r]) {
                    textarea.value = originalPresetTexts[r];
                } else {
                    textarea.value = "（空）";
                }
                
                // 文字一改變就即時自動存檔
                textarea.oninput = (function(roundIdx) { 
                    return function() { 
                        autoSaveRoundData(roundIdx); 
                    } 
                })(r);

                let parseBtn = document.createElement('button');
                parseBtn.type = "button"; parseBtn.className = "btn"; parseBtn.style.width = "100%";
                parseBtn.innerText = "📋 解析並帶入右側下拉單";
                parseBtn.onclick = (function(roundIdx) { 
                    return function() { 
                        parseTextToDropdown(roundIdx); 
                    }; 
                })(r);

                pasteZone.appendChild(textarea); pasteZone.appendChild(parseBtn);

                let gridContainer = document.createElement('div');
                gridContainer.className = 'dropdown-grid-container';

                let storedDrop = localStorage.getItem(`autosave_drop_round_${r}`);
                let parsedDrop = storedDrop ? JSON.parse(storedDrop) : null;

                for (let i = 0; i < 16; i++) {
                    let row = document.createElement('div'); row.className = 'item-row';
                    let numSpan = document.createElement('span'); numSpan.className = 'item-num'; numSpan.innerText = i + 1;

                    let selectItem = document.createElement('select'); selectItem.className = 'select-item'; selectItem.id = `sel-item-${r}-${i}`;
                    availableItems.forEach(t => { let o = document.createElement('option'); o.value = t; o.innerText = t; selectItem.appendChild(o); });

                    let selectQty = document.createElement('select'); selectQty.className = 'select-qty'; selectQty.id = `sel-qty-${r}-${i}`;
                    for(let q = 1; q <= 20; q++) { let o = document.createElement('option'); o.value = q; o.innerText = `${q} 個`; selectQty.appendChild(o); }

                    // 下拉單改變時也自動存檔
                    selectItem.onchange = (function(roundIdx) {
                        return function() { 
                            selectQty.style.visibility = (this.value === "炸彈" || this.value === "（空）") ? "hidden" : "visible";
                            autoSaveRoundData(roundIdx);
                        };
                    })(r);
                    
                    selectQty.onchange = (function(roundIdx) { 
                        return function() { 
                            autoSaveRoundData(roundIdx); 
                        }; 
                    })(r);

                    if (parsedDrop && parsedDrop[i]) {
                        if (!availableItems.includes(parsedDrop[i].name)) {
                            let opt = document.createElement('option'); opt.value = parsedDrop[i].name; opt.innerText = parsedDrop[i].name;
                            selectItem.appendChild(opt);
                        }
                        selectItem.value = parsedDrop[i].name; selectQty.value = parsedDrop[i].qty;
                    } else if (backupDropdowns[r] && backupDropdowns[r][i] && backupDropdowns[r][i].name !== "（空）") {
                        selectItem.value = backupDropdowns[r][i].name; selectQty.value = backupDropdowns[r][i].qty;
                    } else {
                        selectItem.value = "（空）"; selectQty.value = 1;
                    }
                    selectItem.onchange();

                    row.appendChild(numSpan); row.appendChild(selectItem); row.appendChild(selectQty);
                    gridContainer.appendChild(row);
                }

                flexLayout.appendChild(pasteZone); flexLayout.appendChild(gridContainer);
                panel.appendChild(flexLayout); tabContents.appendChild(panel);

                if (!storedDrop && originalPresetTexts[r] && (!backupDropdowns[r] || backupDropdowns[r].length === 0)) {
                    parseTextToDropdown(r);
                }
            }
        }

        function parseTextToDropdown(roundIndex) {
            let txt = document.getElementById(`txt-paste-${roundIndex}`).value;
            let lines = txt.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let items = [];
            
            lines.forEach(line => {
                let match = line.match(/^([^\*,x,X,\s，、]+)(?:\s*[\*,x,X,，,、,\s,數量]+\s*(\d+))?/);
                if (match) {
                    let name = match[1].trim();
                    if(name === "品項" || name === "品項*數量") return;
                    let qty = match[2] ? parseInt(match[2]) : 1;
                    items.push({ name: name, qty: qty });
                }
            });

            for (let i = 0; i < 16; i++) {
                let selItem = document.getElementById(`sel-item-${roundIndex}-${i}`);
                let selQty = document.getElementById(`sel-qty-${roundIndex}-${i}`);
                if(selItem && selQty) {
                    if (items[i]) {
                        if (!availableItems.includes(items[i].name)) {
                            let opt = document.createElement('option'); opt.value = items[i].name; opt.innerText = items[i].name;
                            selItem.appendChild(opt);
                        }
                        selItem.value = items[i].name; 
                        selQty.value = items[i].qty > 20 ? 20 : items[i].qty;
                    } else {
                        selItem.value = "（空）"; selQty.value = 1;
                    }
                    selItem.onchange();
                }
            }
            // 解析後自動存檔
            autoSaveRoundData(roundIndex);
        }

        function switchTab(targetIndex) {
            let rounds = parseInt(totalRoundsInput.value);
            for(let i = 1; i <= rounds; i++) {
                let btn = document.getElementById(`tab-btn-${i}`), panel = document.getElementById(`tab-panel-${i}`);
                if(btn && panel) {
                    if(i === targetIndex) { btn.classList.add('active'); panel.classList.add('active'); }
                    else { btn.classList.remove('active'); panel.classList.remove('active'); }
                }
            }
        }

        // ==========================================
        // 核心遊戲引擎邏輯
        // ==========================================

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array;
        }

        function updateTimerDisplay() {
            let mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
            timerDisplay.innerText = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
            progressBar.style.width = `${(timeLeft / initialTimeLimit) * 100}%`;

            if (gameState === 'playing' && timeLeft <= 10 && timeLeft > 0) {
                timerDisplay.classList.add('danger'); document.body.classList.add('panic-mode');
            } else {
                timerDisplay.classList.remove('danger'); document.body.classList.remove('panic-mode');
            }
        }

        // 重新部署
        function applySettingsAndReset() {
            document.body.classList.remove('panic-mode');
            maxRounds = parseInt(totalRoundsInput.value) || 7;
            flipIntervalSeconds = parseInt(secondsInput.value) || 5; // 🛠️ 讀取新的秒數
            
            initialTimeLimit = parseInt(timerLimitInput.value) || 120; 
            timeLeft = initialTimeLimit;
            
            currentRound = 1; 
            importArea.style.display = 'none';
            initRoundBoard();
        }

        function initRoundBoard() {
            if (autoFlipTimer) clearInterval(autoFlipTimer);
            if (countdownTimer) clearInterval(countdownTimer);
            document.body.classList.remove('panic-mode');
            
            initialTimeLimit = parseInt(timerLimitInput.value) || 120;
            timeLeft = initialTimeLimit; 
            updateTimerDisplay();

            gameState = 'ready'; mainGameBtn.disabled = false; mainGameBtn.className = "btn btn-main btn-start"; mainGameBtn.innerText = "▶ START GAME";
            pauseGameBtn.style.display = "none"; pauseGameBtn.innerText = "⏸️ PAUSE";
            endRoundBtn.style.display = "none"; 
            
            let roundMins = Math.floor(initialTimeLimit / 60);
            let roundSecs = initialTimeLimit % 60;
            let timeString = roundSecs > 0 ? `${roundMins} 分 ${roundSecs} 秒` : `${roundMins} 分鐘`;
            statusHint.innerText = `第 ${currentRound} 回合戰略配置就緒！（本回合時限：${timeString}）`;
            
            board.innerHTML = ''; flippedCount = 0; flippedCountDisplay.innerText = flippedCount;
            currentRoundDisplay.innerText = currentRound; totalRoundsDisplay.innerText = maxRounds;

            let currentRoundData = [];
            for (let i = 0; i < 16; i++) {
                let selItem = document.getElementById(`sel-item-${currentRound}-${i}`), selQty = document.getElementById(`sel-qty-${currentRound}-${i}`);
                if (selItem && selQty) currentRoundData.push({ name: selItem.value, qty: parseInt(selQty.value) });
                else currentRoundData.push({ name: "（空）", qty: 1 });
            }

            const shuffledItems = shuffle([...currentRoundData]);

            shuffledItems.forEach((item) => {
                const card = document.createElement('div'); card.classList.add('card');
                let contentHtml = "";
                if (item.name === "炸彈") {
                    card.dataset.isBomb = "true";
                    contentHtml = `<div class="card-face card-front"><img src="${bombIconUrl}" class="bomb-img" alt="炸彈"></div>`;
                } else if (item.name === "（空）") {
                    contentHtml = `<div class="card-face card-front"><span class="item-name" style="color:#94a3b8 !important;">無物資</span></div>`;
                } else {
                    if (["深蹲", "開合跳", "蛙跳", "伏地挺身"].includes(item.name)) {
                        contentHtml = `<div class="card-face card-front" style="background:#fff3cd !important;"><span class="item-name" style="color:#856404 !important;">${item.name}</span><span class="qty-tag" style="color:#856404 !important;">${item.qty} 次</span></div>`;
                    } else {
                        contentHtml = `<div class="card-face card-front"><span class="item-name">${item.name}</span><span class="qty-tag">* ${item.qty}</span></div>`;
                    }
                }
                card.innerHTML = `<div class="card-face card-back">?</div>${contentHtml}`;
                card.addEventListener('click', function() { if (gameState === 'playing' && !this.classList.contains('flipped')) exposeCard(this, false); });
                board.appendChild(card);
            });
        }

        function handleMainBtnClick() {
            if(gameState === 'ready') {
                gameState = 'playing'; mainGameBtn.disabled = true; mainGameBtn.innerText = "🚀 OPERATING..."; 
                pauseGameBtn.style.display = "block";
                endRoundBtn.style.display = "block"; 
                statusHint.innerText = `⏱️ 戰場干擾中！每 ${flipIntervalSeconds} 秒隨機解鎖一個項目！`;
                document.querySelectorAll('.card').forEach(c => c.classList.add('playable'));
                startAutoFlipTimer(); startCountdownTimer();
            } else if (gameState === 'round_end') {
                if (currentRound < maxRounds) {
                    currentRound++;
                    initRoundBoard();
                } else {
                    gameState = 'game_over';
                    statusHint.innerText = "🏆 總任務全數結束！可重新部署新戰場。";
                    mainGameBtn.className = "btn btn-main btn-start";
                    mainGameBtn.innerText = "🔄 重新開始遊戲";
                }
            } else if (gameState === 'game_over') {
                currentRound = 1; 
                initRoundBoard();
            }
        }

        function handlePauseBtnClick() {
            if (gameState === 'playing') {
                gameState = 'paused'; clearInterval(autoFlipTimer); clearInterval(countdownTimer); document.body.classList.remove('panic-mode');
                pauseGameBtn.innerText = "▶️ RESUME"; statusHint.innerText = "⏸️ 戰局暫停。";
            } else if (gameState === 'paused') {
                gameState = 'playing';
                pauseGameBtn.innerText = "⏸️ PAUSE"; statusHint.innerText = `⏱️ 戰場干擾中！每 ${flipIntervalSeconds} 秒隨機解鎖一個項目！`;
                startCountdownTimer();
                const unexposedCards = document.querySelectorAll('.card:not(.flipped)');
                if (unexposedCards.length > 0) {
                    autoFlipTimer = setInterval(pickAndExposeRandomCard, flipIntervalSeconds * 1000);
                }
            }
        }

        function handleEndRoundBtnClick() {
            clearInterval(autoFlipTimer);
            clearInterval(countdownTimer);
            document.body.classList.remove('panic-mode');
            
            gameState = 'round_end';
            statusHint.innerText = `第 ${currentRound} 回合已手動結算！`;
            
            mainGameBtn.disabled = false;
            mainGameBtn.className = "btn btn-main btn-next";
            mainGameBtn.innerText = currentRound < maxRounds ? "⏭️ NEXT ROUND" : "🏆 GAME OVER";
            
            pauseGameBtn.style.display = "none";
            endRoundBtn.style.display = "none";
        }

        function startAutoFlipTimer() {
            if (autoFlipTimer) clearInterval(autoFlipTimer);
            pickAndExposeRandomCard();
            autoFlipTimer = setInterval(function() {
                pickAndExposeRandomCard();
            }, flipIntervalSeconds * 1000);
        }

        function pickAndExposeRandomCard() {
            const unexposedCards = Array.from(document.querySelectorAll('.card:not(.flipped)'));
            if (unexposedCards.length > 0) {
                const randomIndex = Math.floor(Math.random() * unexposedCards.length);
                exposeCard(unexposedCards[randomIndex], true);
            }
        }

        function startCountdownTimer() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(function() {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    clearInterval(autoFlipTimer);
                    document.body.classList.remove('panic-mode');
                    
                    gameState = 'round_end';
                    statusHint.innerText = `⏰ 第 ${currentRound} 回合時間到！本回合強制截止。`;
                    
                    mainGameBtn.disabled = false;
                    mainGameBtn.className = "btn btn-main btn-next";
                    mainGameBtn.innerText = currentRound < maxRounds ? "⏭️ NEXT ROUND" : "🏆 GAME OVER";
                    
                    pauseGameBtn.style.display = "none";
                    endRoundBtn.style.display = "none";
                }
            }, 1000);
        }

        function exposeCard(card, isAuto) {
            if (card.classList.contains('flipped')) return;

            card.classList.add('flipped');
            if (isAuto) {
                card.classList.add('auto-flipped');
            }
            
            if (card.dataset.isBomb === "true") {
                card.classList.add('bomb-exploded');
            }

            flippedCount++;
            flippedCountDisplay.innerText = flippedCount;

            if (flippedCount === 16) {
                clearInterval(autoFlipTimer); 
                statusHint.innerText = "🚨 物資全數翻開！時間仍在倒數，請火速點擊左側【結束該回合】結算！";
            }
        }

        window.onload = function() {
            loadSettingsFromAutoSave();
            generateTabs();
            applySettingsAndReset();
        };
    </script>
</body>
</html>
